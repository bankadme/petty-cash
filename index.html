<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 ระบบบัญชีเงินสำรอง — NISTO</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f5f3ef;--sf:#fff;--bdr:#e0dcd5;--tx:#2d2a26;--dm:#7a756d;--acc:#2563eb;--accS:rgba(37,99,235,.08);--accB:rgba(37,99,235,.2);--gn:#16a34a;--gnS:rgba(22,163,74,.07);--gnB:rgba(22,163,74,.25);--rd:#dc2626;--rdS:rgba(220,38,38,.07);--rdB:rgba(220,38,38,.25);--am:#d97706;--amS:rgba(217,119,6,.07);--amB:rgba(217,119,6,.25)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:16px}
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;height:100%}
input,select,textarea,button{font-family:'Sarabun',sans-serif;font-size:15px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)!important;box-shadow:0 0 0 3px var(--accS)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--bdr);background:#fff;color:var(--tx);font-size:15px}
.btn{padding:13px 0;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:all .15s}
.btn:hover{filter:brightness(.95)}
.btn-sm{padding:6px 12px;border-radius:8px;border:1.5px solid var(--bdr);background:#fff;color:var(--dm);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-sm:hover{border-color:var(--acc);color:var(--acc);background:var(--accS)}
.chip{padding:5px 12px;border-radius:8px;font-size:13px;font-weight:600;border:2px solid var(--bdr);background:#fff;color:var(--dm);cursor:pointer;transition:all .12s}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.chip.on{border-color:var(--acc);background:var(--acc);color:#fff}
.badge{padding:4px 10px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}
.label{font-size:13px;color:var(--dm);margin-bottom:4px;font-weight:600}
.sep{width:2px;height:20px;background:var(--bdr);margin:0 2px;flex-shrink:0}
.header{padding:8px 20px;border-bottom:2px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:#fff;flex-shrink:0;gap:8px}
.main{flex:1;display:flex;overflow:hidden;min-height:0}
.left-panel{width:370px;min-width:370px;border-right:2px solid var(--bdr);background:#fff;overflow-y:auto;transition:margin-left .3s ease,opacity .25s ease;z-index:10;display:flex;flex-direction:column;min-height:0}
.left-panel.closed{margin-left:-370px;opacity:0;pointer-events:none}
.left-top{padding:8px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:#faf9f7}
.left-inner{padding:14px 16px;flex:1;overflow-y:auto;min-height:0}
.toggle-panel-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
.right-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.bal-row{padding:10px 18px;display:flex;gap:8px;flex-shrink:0;border-bottom:2px solid var(--bdr);background:#faf9f7}
.bal-card{flex:1;background:#fff;border-radius:12px;padding:10px 12px;border:2px solid var(--bdr);min-width:0}
.bal-card.big{flex:1.5;padding:12px 14px;background:linear-gradient(135deg,#eef4ff,#fff);border-color:var(--accB)}
.bal-label{font-size:11px;color:var(--dm);margin-bottom:2px;font-weight:600}
.bal-val{font-size:20px;font-weight:800;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bal-card.big .bal-val{font-size:24px}
.alert-bar{padding:10px 20px;font-size:14px;font-weight:700;flex-shrink:0;display:flex;gap:16px;align-items:center}
.alert-bar.warn{background:#fef2f2;color:#991b1b;border-bottom:2px solid var(--rdB)}
.filters{padding:8px 18px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0;background:#faf9f7;border-bottom:1px solid var(--bdr)}
.table-wrap{flex:1;overflow:auto;padding:0 18px 18px;background:var(--bg);min-height:0}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{padding:8px 8px;text-align:left;color:var(--dm);font-weight:700;font-size:12px;border-bottom:2px solid var(--bdr);white-space:nowrap;background:#fff;position:sticky;top:0;z-index:1}
tbody tr{border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s;background:#fff}
tbody tr:hover{background:var(--accS)}
tbody td{padding:7px 8px}
.toggle-bar{display:flex;background:var(--bg);border-radius:12px;padding:3px;margin-bottom:14px}
.toggle-btn{flex:1;padding:10px 0;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--dm)}
.toggle-btn.on-rd{background:var(--rd);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.25)}
.toggle-btn.on-gn{background:var(--gn);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.chan-btn{flex:1;padding:9px 0;border-radius:9px;border:2px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--dm)}
.sug-box{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--bdr);border-radius:12px;max-height:280px;overflow-y:auto;z-index:50;box-shadow:0 10px 28px rgba(0,0,0,.1)}
.sug-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.sug-item:hover{background:var(--accS)}
.sug-item:last-child{border-bottom:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border:2px solid var(--bdr);border-radius:18px;padding:24px;width:95%;max-height:88vh;overflow:auto;box-shadow:0 16px 48px rgba(0,0,0,.12)}
.manage-page{flex:1;overflow:auto;padding:24px;display:flex;gap:24px;background:var(--bg)}
.manage-col{flex:1;min-width:0}
.cat-row{padding:8px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;background:#fff}
.cat-row .move-btn{background:none;border:none;color:var(--dm);cursor:pointer;font-size:14px;padding:2px 4px}
.cat-row .move-btn:hover{color:var(--acc)}
.tpl-row{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;background:#fff}
.tab-bar{display:flex;background:var(--bg);border-radius:9px;padding:2px;margin-right:6px}
.tab-btn{padding:6px 14px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--dm)}
.tab-btn.on{background:var(--acc);color:#fff}
.summary-card{background:#fff;border:2px solid var(--bdr);border-radius:12px;padding:14px;margin-top:14px}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0ece6,#e8e4dd)}
.login-box{background:#fff;border-radius:24px;padding:40px 36px;width:380px;box-shadow:0 16px 48px rgba(0,0,0,.1);border:2px solid var(--bdr);text-align:center}
.db-warn{background:#fef2f2;color:#991b1b;padding:8px 20px;font-size:14px;font-weight:600;text-align:center;flex-shrink:0;border-bottom:2px solid var(--rdB)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid var(--bdr);color:var(--tx);padding:12px 24px;border-radius:12px;font-size:15px;font-weight:600;z-index:300;box-shadow:0 6px 24px rgba(0,0,0,.1);animation:toastIn .25s ease}
@media print{.header,.left-panel,.filters,.btn-sm,.no-print,.toggle-panel-btn,.alert-bar{display:none!important}body{background:#fff;height:auto;overflow:visible}.main{display:block!important}.right-panel{overflow:visible!important}.bal-row{print-color-adjust:exact;-webkit-print-color-adjust:exact}.table-wrap{overflow:visible!important;padding:0!important}table{font-size:12px}}

/* ── Mobile/Tablet responsive ── */
@media(max-width:1200px){
  body{height:auto;overflow:auto}
  #app{height:auto;overflow:visible}
  .header{flex-wrap:wrap;padding:8px 12px;gap:6px}
  .header>div:first-child{width:100%}
  .header>div:last-child{width:100%;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .tab-bar{margin-right:4px;flex-shrink:0}
  .btn-sm{flex-shrink:0}
  .main{flex-direction:column;overflow:visible;min-height:auto}
  .toggle-panel-btn{font-size:14px;padding:8px 16px;width:auto}
  .left-top{padding:8px 12px}
  .left-panel{width:100%!important;min-width:0!important;border-right:none!important;border-bottom:2px solid var(--bdr);transition:none;order:0;overflow:visible;min-height:auto}
  .left-panel.closed{margin-left:0!important;max-height:0;overflow:hidden;opacity:0;padding:0;border:none}
  .left-panel:not(.closed){max-height:none;opacity:1}
  .left-inner{padding:12px 14px;overflow-y:visible;flex:none}
  .right-panel{overflow:visible;min-height:auto;order:1}
  .bal-row{flex-wrap:wrap;padding:10px 12px;gap:6px}
  .bal-card{flex:1 1 45%;min-width:120px}
  .bal-card.big{flex:1 1 100%}
  .bal-val{font-size:18px}
  .bal-card.big .bal-val{font-size:22px}
  .filters{padding:8px 12px;gap:4px;overflow-x:auto;flex-wrap:wrap}
  .filters .sep{display:none}
  .chip{padding:4px 10px;font-size:12px}
  .filters input[type="date"]{width:110px!important;font-size:11px!important;padding:4px 4px!important}
  .filters select{width:100px!important;font-size:11px!important;padding:4px 4px!important}
  .filters input[type="text"]{width:100%!important;font-size:12px!important}
  .table-wrap{padding:0 8px 12px;overflow-x:auto;overflow-y:visible;min-height:auto;flex:none}
  table{font-size:12px;min-width:600px}
  thead th{padding:6px 6px;font-size:11px}
  tbody td{padding:6px 6px;font-size:12px}
  .alert-bar{padding:8px 12px;font-size:13px;flex-wrap:wrap;gap:6px}
  .overlay{padding:8px}
  .modal{padding:18px;border-radius:14px;max-height:92vh}
  .manage-page{flex-direction:column;padding:16px;gap:16px}
  .login-wrap{padding:16px}
  .login-box{width:100%;max-width:380px;padding:28px 24px}
  .summary-card{padding:10px}
  .toggle-bar{margin-bottom:10px}
  .toggle-btn{padding:9px 0;font-size:13px}
  .chan-btn{padding:8px 0;font-size:12px}
  .sug-box{max-height:200px}
  .sug-item{padding:8px 10px}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG={apiKey:"AIzaSyBOj-7kwWKESs5yHwoYsIXEKjdumDv_jOk",authDomain:"nisto-factory.firebaseapp.com",databaseURL:"https://nisto-factory-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"nisto-factory",storageBucket:"nisto-factory.firebasestorage.app",messagingSenderId:"433281512237",appId:"1:433281512237:web:0ebf9dd587c0dbcca419a4"};
const USERS={admin:'1234',nang:'nang'};
let db,dbOk=false;
try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();dbOk=true;}catch(e){console.error(e);}
async function fbGet(p){const s=await db.ref(p).once('value');return s.val();}
async function fbSet(p,d){await db.ref(p).set(d);}
async function fbPush(p,d){const r=await db.ref(p).push(d);return r.key;}
async function fbDel(p){await db.ref(p).remove();}
async function fbUpdate(p,d){await db.ref(p).update(d);}
const fmt=n=>Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const thaiDate=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${Number(y)+543}`;};
const thaiMonth=ym=>{const ms=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];const[y,m]=ym.split('-');return`${ms[parseInt(m)]} ${Number(y)+543}`;};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
const DEFAULT_CATS=[{icon:'📦',label:'วัสดุสำนักงาน'},{icon:'🧹',label:'วัสดุทำความสะอาด'},{icon:'🍱',label:'ค่าอาหาร'},{icon:'⛽',label:'ค่าแก๊ส'},{icon:'🚗',label:'ค่าเดินทาง'},{icon:'🔧',label:'ค่าซ่อมบำรุง'},{icon:'💰',label:'ค่าจ้างเงินสด'},{icon:'⚡',label:'ค่าสาธารณูปโภค'},{icon:'🏭',label:'วัสดุโรงงาน'},{icon:'📮',label:'ค่าธรรมเนียม'},{icon:'🎁',label:'สวัสดิการ'},{icon:'🔄',label:'อื่นๆ'}];
const DEFAULT_CATS_IN=[{icon:'📥',label:'เงินสำรองเข้า'},{icon:'🔄',label:'อื่นๆ (รับ)'}];

let S={loggedIn:false,user:'',txs:[],templates:[],cats:[...DEFAULT_CATS],catsIn:[...DEFAULT_CATS_IN],initBal:{cash:0,bank:0},page:'main',panelOpen:true,form:{date:today(),type:'out',channel:'cash',category:'',name:'',amount:'',note:''},editId:null,showSug:false,suggestions:[],fType:'all',fChan:'all',fCat:'all',fFrom:'',fTo:'',fSearch:'',tplForm:{name:'',type:'out',channel:'cash',category:''},editTplId:null,catForm:{icon:'📌',label:''},catInForm:{icon:'📌',label:''},editCatIdx:null,editCatType:null,editCatForm:{icon:'',label:''}};

let toastTimer;
function fire(m){clearTimeout(toastTimer);const el=document.getElementById('toast');if(el){el.textContent=m;el.style.display='block';}toastTimer=setTimeout(()=>{const e=document.getElementById('toast');if(e)e.style.display='none';},2800);}
function resetForm(){S.form={date:today(),type:'out',channel:'cash',category:'',name:'',amount:'',note:''};S.editId=null;S.showSug=false;S.suggestions=[];}

// ── Login ────────────────────────────────────────────────────────
function tryLogin(){
  const u=document.getElementById('login-user')?.value.trim().toLowerCase();
  const p=document.getElementById('login-pass')?.value;
  if(USERS[u]===p){S.loggedIn=true;S.user=u;loadData();}
  else{const el=document.getElementById('login-err');if(el)el.textContent='❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';}
}
function logout(){S.loggedIn=false;S.user='';render();}

// ── Load ─────────────────────────────────────────────────────────
async function loadData(){
  if(!dbOk){render();return;}
  try{
    const[tx,tpl,cat,catIn,bal]=await Promise.all([fbGet('transactions'),fbGet('templates'),fbGet('categories'),fbGet('categoriesIn'),fbGet('initBalance')]);
    if(tx)S.txs=Object.entries(tx).map(([k,v])=>({...v,_key:k}));
    if(tpl)S.templates=Object.entries(tpl).map(([k,v])=>({...v,_key:k}));
    if(cat)S.cats=Object.values(cat);
    if(catIn)S.catsIn=Object.values(catIn);
    if(bal)S.initBal=bal;
  }catch(e){console.error(e);dbOk=false;}
  if(dbOk)db.ref('transactions').on('value',snap=>{const d=snap.val();S.txs=d?Object.entries(d).map(([k,v])=>({...v,_key:k})):[];render();});
  render();
}

// ── Computed ─────────────────────────────────────────────────────
function getBal(){let c=S.initBal.cash||0,b=S.initBal.bank||0;for(const t of S.txs){const a=t.amount;if(t.type==='in'){t.channel==='cash'?c+=a:b+=a;}else{t.channel==='cash'?c-=a:b-=a;}}return{cash:c,bank:b,total:c+b};}
function getMonthSum(){const ym=new Date().toISOString().slice(0,7);let inc=0,exp=0;S.txs.forEach(t=>{if(t.date?.startsWith(ym)){t.type==='in'?inc+=t.amount:exp+=t.amount;}});return{inc,exp};}
function getCatSummary(){const ym=new Date().toISOString().slice(0,7);const m={};S.txs.forEach(t=>{if(t.type==='out'&&t.date?.startsWith(ym))m[t.category]=(m[t.category]||0)+t.amount;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function getFiltered(){let l=[...S.txs].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||b.ts-a.ts);if(S.fType!=='all')l=l.filter(t=>t.type===S.fType);if(S.fChan!=='all')l=l.filter(t=>t.channel===S.fChan);if(S.fCat!=='all')l=l.filter(t=>t.category===S.fCat);if(S.fFrom)l=l.filter(t=>t.date>=S.fFrom);if(S.fTo)l=l.filter(t=>t.date<=S.fTo);if(S.fSearch.trim()){const q=S.fSearch.toLowerCase();l=l.filter(t=>[t.category,t.name,t.note,t.date].join(' ').toLowerCase().includes(q));}return l;}
function getUsedCats(){return[...new Set(S.txs.map(t=>t.category))].sort();}

// ── CRUD ─────────────────────────────────────────────────────────
async function saveTx(){
  const a=parseFloat(S.form.amount);if(!a||a<=0){fire('⚠️ ระบุจำนวนเงิน');return;}
  if(!S.form.category){fire('⚠️ เลือกหมวดหมู่');return;}
  // Check duplicate (same name + amount + date)
  if(!S.editId&&S.form.name.trim()){
    const dup=S.txs.find(t=>t.name===S.form.name.trim()&&t.amount===a&&t.date===S.form.date);
    if(dup&&!confirm(`⚠️ มีรายการซ้ำ:\n"${dup.name}" จำนวน ฿${fmt(dup.amount)} วันที่ ${thaiDate(dup.date)}\n\nต้องการบันทึกซ้ำหรือไม่?`))return;
  }
  const tx={ts:Date.now(),type:S.form.type,channel:S.form.channel,date:S.form.date,amount:a,category:S.form.category,name:S.form.name.trim(),note:S.form.note.trim(),user:S.user};
  if(S.editId){await fbUpdate(`transactions/${S.editId}`,tx);fire('✅ แก้ไขแล้ว');}
  else{await fbPush('transactions',tx);fire('✅ บันทึกแล้ว');}
  resetForm();render();
}
function startEdit(tx){S.form={date:tx.date,type:tx.type,channel:tx.channel,category:tx.category,name:tx.name||'',amount:String(tx.amount),note:tx.note||''};S.editId=tx._key;S.page='main';S.panelOpen=true;render();}
async function deleteTx(key){await fbDel(`transactions/${key}`);if(S.editId===key)resetForm();fire('🗑️ ลบแล้ว');render();}

// ── Suggestions ──────────────────────────────────────────────────
function buildSuggestions(text){
  if(!text||text.length<1){S.suggestions=[];S.showSug=false;return;}
  const q=text.toLowerCase(),seen=new Set(),result=[];
  for(const t of S.templates)if(t.name.toLowerCase().includes(q)&&!seen.has(t.name)){seen.add(t.name);result.push({...t,src:'tpl'});}
  for(const t of[...S.txs].sort((a,b)=>b.ts-a.ts))if(t.name&&t.name.toLowerCase().includes(q)&&!seen.has(t.name)){seen.add(t.name);result.push({name:t.name,type:t.type,channel:t.channel,category:t.category,src:'history'});if(result.length>=10)break;}
  S.suggestions=result.slice(0,10);S.showSug=result.length>0;
}
window.applySuggestion=function(i){const s=S.suggestions[i];if(!s)return;S.form.name=s.name;if(s.type)S.form.type=s.type;if(s.channel)S.form.channel=s.channel;if(s.category)S.form.category=s.category;S.showSug=false;render();setTimeout(()=>{const e=document.getElementById('amount-input');if(e)e.focus();},50);};

// ── Import ───────────────────────────────────────────────────────
async function importPaste(results){for(const r of results){r.user=S.user;await fbPush('transactions',r);}fire(`✅ นำเข้า ${results.length} รายการ`);render();}
function parsePaste(text){const lines=text.trim().split('\n').filter(Boolean),R=[],E=[];for(let i=0;i<lines.length;i++){const c=lines[i].split('\t');if(c.length<6){E.push(`แถว ${i+1}: คอลัมน์ไม่ครบ`);continue;}let[rD,rT,rC,rCat,rN,rA,...rest]=c;let date=today();rD=rD.trim();const sm=rD.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);if(sm){let yr=parseInt(sm[3]);if(yr>2400)yr-=543;if(yr<100)yr+=2000;date=`${yr}-${sm[2].padStart(2,'0')}-${sm[1].padStart(2,'0')}`;}else if(/^\d{4}-\d{2}-\d{2}$/.test(rD))date=rD;const type=rT.trim().includes('รับ')?'in':'out';const ch=(rC.trim().includes('โอน')||rC.trim().toLowerCase().includes('bank'))?'transfer':'cash';const cat=rCat.trim()||'อื่นๆ';const nm=rN.trim();const amt=parseFloat(rA.replace(/[^0-9.\-]/g,''));if(!amt||amt<=0){E.push(`แถว ${i+1}: จำนวนเงินไม่ถูกต้อง`);continue;}R.push({ts:Date.now()+i,type,channel:ch,date,amount:amt,category:cat,name:nm,note:rest.join(' ').trim()});}return{results:R,errors:E};}
function parseSalaryPaste(text,date,defChan){const lines=text.trim().split('\n').filter(Boolean),R=[],E=[];for(let i=0;i<lines.length;i++){const c=lines[i].split('\t');if(c.length<3){E.push(`แถว ${i+1}: คอลัมน์ไม่ครบ`);continue;}let nm='',amt='',st='',co='';if(c.length>=4){nm=c[0].trim();st=c[1].trim();amt=c[2].trim();co=c[3]?.trim()||'';}else{nm=c[0].trim();amt=c[1].trim();st=c[2]?.trim()||'';}if(!/[\d]/.test(amt)&&/[\d]/.test(st))[amt,st]=[st,amt];const a=parseFloat(amt.replace(/[^0-9.\-]/g,''));if(!a||a<=0){E.push(`แถว ${i+1}: จำนวนเงินไม่ถูกต้อง`);continue;}let en=nm.replace(/^['"]+|['"]+$/g,'').trim().replace(/^\d+[\s']*/,'').trim();if(!en){E.push(`แถว ${i+1}: ไม่พบชื่อ`);continue;}let ch=defChan;if(st.includes('ยังไม่มี')||st.includes('ไม่มี')||st.includes('เงินสด'))ch='cash';else if(st.includes('โอน')||st.includes('บัญชี'))ch='transfer';R.push({ts:Date.now()+i,type:'out',channel:ch,date,amount:a,category:'ค่าจ้างเงินสด',name:`เงินเดือน ${en}`,note:co});}return{results:R,errors:E};}

function exportExcel(){
  const data=getFiltered();if(!data.length){fire('⚠️ ไม่มีข้อมูล');return;}const bal=getBal();const wb=XLSX.utils.book_new();
  const hdr=[['รายงานเงินสำรอง — NISTO'],[''],['วันที่ส่งออก:',thaiDate(today()),'','ยอดเงินสด:',fmt(bal.cash),'ยอดบัญชี:',fmt(bal.bank)],['','','','ยอดรวม:',fmt(bal.total)],[''],['วันที่','รับ/จ่าย','ช่องทาง','หมวดหมู่','ชื่อรายการ','จำนวนเงิน','หมายเหตุ']];
  const rows=data.map(t=>[thaiDate(t.date),t.type==='in'?'รับ':'จ่าย',t.channel==='cash'?'เงินสด':'โอน',t.category,t.name||'',t.amount,t.note||'']);
  const tIn=data.filter(t=>t.type==='in').reduce((s,t)=>s+t.amount,0),tOut=data.filter(t=>t.type==='out').reduce((s,t)=>s+t.amount,0);
  rows.push([],['','','','','รวมรายรับ',tIn,''],['','','','','รวมรายจ่าย',tOut,'']);
  const ws=XLSX.utils.aoa_to_sheet([...hdr,...rows]);ws['!cols']=[{wch:16},{wch:10},{wch:12},{wch:22},{wch:35},{wch:16},{wch:30}];ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:6}}];
  const rng=XLSX.utils.decode_range(ws['!ref']);for(let r=6;r<=rng.e.r;r++){const c=ws[XLSX.utils.encode_cell({r,c:5})];if(c&&typeof c.v==='number'){c.t='n';c.z='#,##0.00';}}
  XLSX.utils.book_append_sheet(wb,ws,'รายรับรายจ่าย');
  const cm={};data.forEach(t=>{if(t.type==='out')cm[t.category]=(cm[t.category]||0)+t.amount;});const cr=Object.entries(cm).sort((a,b)=>b[1]-a[1]);const ct=cr.reduce((s,c)=>s+c[1],0);
  const w2d=[['สรุปรายจ่ายตามหมวดหมู่'],[''],['หมวดหมู่','จำนวนเงิน','สัดส่วน (%)'],...cr.map(([c,a])=>[c,a,ct?Math.round(a/ct*100):0]),[],['รวมทั้งหมด',ct,100]];
  const ws2=XLSX.utils.aoa_to_sheet(w2d);ws2['!cols']=[{wch:25},{wch:18},{wch:14}];ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:2}}];XLSX.utils.book_append_sheet(wb,ws2,'สรุปตามหมวดหมู่');
  XLSX.writeFile(wb,`เงินสำรอง_NISTO_${S.fFrom&&S.fTo?S.fFrom+'_'+S.fTo:new Date().toISOString().slice(0,7)}.xlsx`);fire('📥 ดาวน์โหลดแล้ว');
}

// ── Backup / Restore ─────────────────────────────────────────────
function backupData(){
  const data={transactions:S.txs,templates:S.templates,cats:S.cats,catsIn:S.catsIn,initBal:S.initBal,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`NISTO_backup_${today()}.json`;a.click();
  fire('💾 สำรองข้อมูลแล้ว');
}
async function restoreData(input){
  const file=input.files[0];if(!file)return;
  if(!confirm('⚠️ การกู้คืนจะเขียนทับข้อมูลปัจจุบันทั้งหมด ยืนยันหรือไม่?'))return;
  try{
    const text=await file.text();const data=JSON.parse(text);
    if(data.transactions){const obj={};data.transactions.forEach((t,i)=>{const k=t._key||('imp'+i);obj[k]=t;delete obj[k]._key;});await fbSet('transactions',obj);}
    if(data.templates){const obj={};data.templates.forEach((t,i)=>{const k=t._key||('tpl'+i);obj[k]=t;delete obj[k]._key;});await fbSet('templates',obj);}
    if(data.cats)await fbSet('categories',data.cats);
    if(data.catsIn)await fbSet('categoriesIn',data.catsIn);
    if(data.initBal)await fbSet('initBalance',data.initBal);
    document.getElementById('settings-modal')?.remove();
    fire('✅ กู้คืนข้อมูลสำเร็จ — กำลังโหลดใหม่...');
    setTimeout(()=>location.reload(),1500);
  }catch(e){fire('❌ ไฟล์ไม่ถูกต้อง');console.error(e);}
}

// ── Chart data ───────────────────────────────────────────────────
function getChartData(){
  const now=new Date();const thisYM=now.toISOString().slice(0,7);
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);const prevYM=prev.toISOString().slice(0,7);
  const thisMap={},prevMap={};let thisTotal=0,prevTotal=0,thisInc=0,prevInc=0;
  S.txs.forEach(t=>{
    if(t.date?.startsWith(thisYM)){if(t.type==='out'){thisMap[t.category]=(thisMap[t.category]||0)+t.amount;thisTotal+=t.amount;}else{thisInc+=t.amount;}}
    if(t.date?.startsWith(prevYM)){if(t.type==='out'){prevMap[t.category]=(prevMap[t.category]||0)+t.amount;prevTotal+=t.amount;}else{prevInc+=t.amount;}}
  });
  const allCats=[...new Set([...Object.keys(thisMap),...Object.keys(prevMap)])];
  const cats=allCats.map(c=>({cat:c,thisAmt:thisMap[c]||0,prevAmt:prevMap[c]||0})).sort((a,b)=>b.thisAmt-a.thisAmt);
  const maxAmt=Math.max(...cats.map(c=>Math.max(c.thisAmt,c.prevAmt)),1);
  return{cats,thisTotal,prevTotal,thisInc,prevInc,thisYM,prevYM,maxAmt};
}
async function doResetAll(){if(document.getElementById('reset-code')?.value!=='1234'){fire('❌ รหัสไม่ถูกต้อง');return;}if(!confirm('ยืนยันล้างข้อมูลทั้งหมด?'))return;await Promise.all([fbDel('transactions'),fbDel('templates'),fbDel('categories'),fbDel('categoriesIn'),fbDel('initBalance')]);S.txs=[];S.templates=[];S.cats=[...DEFAULT_CATS];S.catsIn=[...DEFAULT_CATS_IN];S.initBal={cash:0,bank:0};resetForm();document.getElementById('settings-modal')?.remove();fire('🗑️ ล้างทั้งหมดแล้ว');render();}

let pasteResults=null;
function openPasteModal(){pasteResults=null;const m=document.createElement('div');m.className='overlay';m.id='paste-modal';m.innerHTML=`<div class="modal" style="max-width:800px" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:800;margin-bottom:4px">📋 นำเข้าจาก Excel</div><div style="font-size:13px;color:var(--dm);margin-bottom:14px;line-height:1.7">คอลัมน์: <b style="color:var(--acc)">วันที่</b> | <b>รับ/จ่าย</b> | <b>ช่องทาง</b> | <b>หมวดหมู่</b> | <b>ชื่อรายการ</b> | <b>จำนวนเงิน</b> | หมายเหตุ</div><textarea class="inp" id="paste-area" rows="5" placeholder="Ctrl+V วางที่นี่..." style="resize:vertical;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre"></textarea><div style="margin-top:10px"><button class="btn" style="background:var(--acc);color:#fff" onclick="previewPaste()">🔍 ตรวจสอบ</button></div><div id="paste-preview"></div></div>`;m.onclick=()=>m.remove();document.body.appendChild(m);}
function previewPaste(){const t=document.getElementById('paste-area')?.value;if(!t?.trim())return;const{results:R,errors:E}=parsePaste(t);pasteResults=R;const el=document.getElementById('paste-preview');if(!el)return;let h='';if(E.length)h+=`<div style="background:var(--rdS);border:2px solid var(--rdB);border-radius:10px;padding:12px;margin-top:12px">${E.map(e=>`<div style="font-size:13px;color:var(--dm)">${esc(e)}</div>`).join('')}</div>`;if(R.length){h+=`<div style="margin-top:12px;font-size:14px;font-weight:700;color:var(--gn)">✅ ${R.length} รายการ</div><div style="max-height:180px;overflow:auto;border-radius:10px;border:2px solid var(--bdr);margin-top:8px"><table><thead><tr><th>วันที่</th><th>รับ/จ่าย</th><th>ช่องทาง</th><th>หมวดหมู่</th><th>ชื่อรายการ</th><th style="text-align:right">จำนวน</th></tr></thead><tbody>${R.map(r=>`<tr style="border-bottom:1px solid var(--bdr);background:#fff"><td style="padding:6px 8px">${thaiDate(r.date)}</td><td style="padding:6px 8px;color:${r.type==='in'?'var(--gn)':'var(--rd)'};font-weight:600">${r.type==='in'?'รับ':'จ่าย'}</td><td style="padding:6px 8px">${r.channel==='cash'?'เงินสด':'โอน'}</td><td style="padding:6px 8px">${esc(r.category)}</td><td style="padding:6px 8px">${esc(r.name)}</td><td style="padding:6px 8px;text-align:right;font-weight:700">${fmt(r.amount)}</td></tr>`).join('')}</tbody></table></div><div style="margin-top:10px"><button class="btn" style="background:var(--gn);color:#fff" onclick="doImport()">📥 นำเข้า ${R.length} รายการ</button></div>`;}el.innerHTML=h;}
async function doImport(){if(!pasteResults?.length)return;await importPaste(pasteResults);document.getElementById('paste-modal')?.remove();}

let salaryResults=null;
function openSalaryModal(){salaryResults=null;const m=document.createElement('div');m.className='overlay';m.id='salary-modal';m.innerHTML=`<div class="modal" style="max-width:840px" onclick="event.stopPropagation()"><div style="font-size:18px;font-weight:800;margin-bottom:4px">💵 นำเข้าเงินเดือน</div><div style="font-size:13px;color:var(--dm);margin-bottom:14px;line-height:1.7">"ยังไม่มี" = เงินสด, มีบัญชี = โอน</div><div style="display:flex;gap:12px;margin-bottom:14px"><div style="flex:1"><div class="label">📅 วันที่จ่าย</div><input class="inp" type="date" id="sal-date" value="${today()}"></div><div style="flex:1"><div class="label">ช่องทางเริ่มต้น</div><select class="inp" id="sal-ch"><option value="cash">💵 เงินสด</option><option value="transfer">🏦 โอน</option></select></div></div><textarea class="inp" id="sal-area" rows="7" placeholder="Ctrl+V วางที่นี่..." style="resize:vertical;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre"></textarea><div style="margin-top:10px"><button class="btn" style="background:var(--am);color:#fff" onclick="previewSal()">🔍 ตรวจสอบ</button></div><div id="sal-preview"></div></div>`;m.onclick=()=>m.remove();document.body.appendChild(m);}
function previewSal(){const t=document.getElementById('sal-area')?.value,d=document.getElementById('sal-date')?.value||today(),ch=document.getElementById('sal-ch')?.value||'cash';if(!t?.trim())return;const{results:R,errors:E}=parseSalaryPaste(t,d,ch);salaryResults=R;const el=document.getElementById('sal-preview');if(!el)return;let h='';if(E.length)h+=`<div style="background:var(--rdS);border:2px solid var(--rdB);border-radius:10px;padding:12px;margin-top:12px">${E.map(e=>`<div style="font-size:13px">${esc(e)}</div>`).join('')}</div>`;if(R.length){const tot=R.reduce((s,r)=>s+r.amount,0),cc=R.filter(r=>r.channel==='cash').length,tc=R.filter(r=>r.channel==='transfer').length;h+=`<div style="margin-top:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center"><span style="font-size:14px;font-weight:700;color:var(--gn)">✅ ${R.length} คน</span><span style="font-size:13px;color:var(--dm)">💵${cc} 🏦${tc}</span><span style="font-size:15px;font-weight:800;color:var(--rd);margin-left:auto">รวม ฿${fmt(tot)}</span></div><div style="max-height:260px;overflow:auto;border-radius:10px;border:2px solid var(--bdr);margin-top:8px"><table><thead><tr><th>#</th><th>ชื่อ</th><th>ช่องทาง</th><th style="text-align:right">จำนวน</th><th>หมายเหตุ</th></tr></thead><tbody>${R.map((r,i)=>`<tr style="border-bottom:1px solid var(--bdr);background:#fff"><td style="padding:6px 8px;color:var(--dm)">${i+1}</td><td style="padding:6px 8px">${esc(r.name)}</td><td style="padding:6px 8px"><span class="badge" style="background:${r.channel==='cash'?'var(--gnS)':'var(--accS)'};color:${r.channel==='cash'?'var(--gn)':'var(--acc)'}">${r.channel==='cash'?'เงินสด':'โอน'}</span></td><td style="padding:6px 8px;text-align:right;font-weight:700">${fmt(r.amount)}</td><td style="padding:6px 8px;font-size:12px;color:var(--dm)">${esc(r.note)}</td></tr>`).join('')}</tbody></table></div><div style="margin-top:10px"><button class="btn" style="background:var(--gn);color:#fff" onclick="doSalImport()">📥 นำเข้า ${R.length} คน — ฿${fmt(tot)}</button></div>`;}el.innerHTML=h;}
async function doSalImport(){if(!salaryResults?.length)return;await importPaste(salaryResults);document.getElementById('salary-modal')?.remove();}

// ── Transfer/Withdraw ────────────────────────────────────────────
function openTransferModal(){
  const m=document.createElement('div');m.className='overlay';m.id='transfer-modal';
  m.innerHTML=`<div class="modal" style="max-width:460px" onclick="event.stopPropagation()">
    <div style="font-size:18px;font-weight:800;margin-bottom:16px">🔄 ถอน/โอนย้ายเงิน</div>
    <div class="label">ทิศทาง</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button id="tf-dir-b2c" class="chan-btn" style="border-color:var(--acc);background:var(--accS);color:var(--tx)" onclick="setTfDir('b2c')">🏦 บัญชี → 💵 เงินสด</button>
      <button id="tf-dir-c2b" class="chan-btn" onclick="setTfDir('c2b')">💵 เงินสด → 🏦 บัญชี</button>
    </div>
    <div class="label">📅 วันที่</div>
    <input class="inp" type="date" id="tf-date" value="${today()}" style="margin-bottom:14px">
    <div class="label">จำนวนเงิน (บาท)</div>
    <input class="inp" type="number" id="tf-amount" placeholder="0.00" style="font-size:24px;font-weight:800;text-align:center;padding:14px;margin-bottom:14px;color:var(--acc)">
    <div class="label">หมายเหตุ</div>
    <input class="inp" type="text" id="tf-note" placeholder="เช่น ถอนเงินเข้าออฟฟิศ..." style="margin-bottom:18px">
    <button class="btn" style="background:var(--acc);color:#fff;font-size:16px" onclick="doTransfer()">✅ บันทึกการโอนย้าย</button>
  </div>`;
  m.onclick=()=>m.remove();document.body.appendChild(m);
}
let tfDir='b2c';
function setTfDir(d){
  tfDir=d;
  const b2c=document.getElementById('tf-dir-b2c'),c2b=document.getElementById('tf-dir-c2b');
  if(d==='b2c'){b2c.style.borderColor='var(--acc)';b2c.style.background='var(--accS)';b2c.style.color='var(--tx)';c2b.style.borderColor='var(--bdr)';c2b.style.background='#fff';c2b.style.color='var(--dm)';}
  else{c2b.style.borderColor='var(--acc)';c2b.style.background='var(--accS)';c2b.style.color='var(--tx)';b2c.style.borderColor='var(--bdr)';b2c.style.background='#fff';b2c.style.color='var(--dm)';}
}
async function doTransfer(){
  const amt=parseFloat(document.getElementById('tf-amount')?.value);
  if(!amt||amt<=0){fire('⚠️ ระบุจำนวนเงิน');return;}
  const date=document.getElementById('tf-date')?.value||today();
  const note=document.getElementById('tf-note')?.value?.trim()||'';
  const ts=Date.now();
  if(tfDir==='b2c'){
    // Bank → Cash: เงินออกจากบัญชี + เงินสดเข้า
    await fbPush('transactions',{ts:ts,type:'out',channel:'transfer',date,amount:amt,category:'ถอน/โอนย้าย',name:'ถอนเงินจากบัญชี → เงินสด',note,user:S.user});
    await fbPush('transactions',{ts:ts+1,type:'in',channel:'cash',date,amount:amt,category:'ถอน/โอนย้าย',name:'รับเงินสดจากบัญชี',note,user:S.user});
  } else {
    // Cash → Bank: เงินสดออก + เข้าบัญชี
    await fbPush('transactions',{ts:ts,type:'out',channel:'cash',date,amount:amt,category:'ถอน/โอนย้าย',name:'นำเงินสดฝากเข้าบัญชี',note,user:S.user});
    await fbPush('transactions',{ts:ts+1,type:'in',channel:'transfer',date,amount:amt,category:'ถอน/โอนย้าย',name:'รับเงินเข้าบัญชีจากเงินสด',note,user:S.user});
  }
  document.getElementById('transfer-modal')?.remove();
  fire('✅ บันทึกการโอนย้ายแล้ว');render();
}

render();
</script>
</body>
